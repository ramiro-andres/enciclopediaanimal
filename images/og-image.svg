  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1015" cy="110" r="180" fill="#ffd166" opacity="0.28"/>
  <circle cx="120" cy="550" r="220" fill="#2dd4bf" opacity="0.18"/>
  <rect x="92" y="92" width="1016" height="446" rx="42" fill="url(#card)" opacity="0.96"/>
