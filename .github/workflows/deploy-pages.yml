name: Desplegar en GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Configurar Pages
        uses: actions/configure-pages@v6

      - name: Preparar sitio estático
        run: |
          mkdir -p _site
          cp index.html .nojekyll manifest.webmanifest sw.js _site/
          cp -r css js data images _site/
          du -sh _site
          find _site -type f | wc -l

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verificar sitio publicado (F4-06)
        run: |
          URL="${{ steps.deployment.outputs.page_url }}"
          echo "Comprobando $URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Sitio responde HTTP 200"
              exit 0
            fi
            echo "Intento $i: HTTP $STATUS — reintentando en 10s..."
            sleep 10
          done
          echo "El sitio no respondió HTTP 200 tras el despliegue"
          exit 1
