name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Instalar minitest
        run: gem install minitest

      - name: Ejecutar pruebas unitarias
        run: ruby -e 'Dir["tests/test_*.rb"].sort.each { |f| require File.expand_path(f) }'

      - name: Auditoría de seguridad estática
        run: ruby tests/test_security.rb

      - name: Validar contenido clínico
        run: ruby scripts/data/validate_clinical_content.rb

      - name: Detección de inconsistencias (Sprint 11)
        run: ruby scripts/data/detect_inconsistencies.rb

      - name: Sugerencias enlaces glosario↔enfermedad (Sprint 12)
        run: ruby scripts/data/suggest_glossary_links.rb

      - name: Verificar imágenes de razas (F4-03)
        run: |
          ruby scripts/images/list_missing_images.rb > /tmp/missing.txt
          if [ -s /tmp/missing.txt ]; then
            echo "Razas sin imagen JPG válida:"
            cat /tmp/missing.txt
            exit 1
          fi
          echo "Todas las razas tienen imagen JPG o SVG de respaldo."

      - name: Verificar imágenes de enfermedades (F3-02 / US-DEV-18)
        run: |
          ruby scripts/images/list_missing_disease_images.rb > /tmp/missing_diseases.txt 2>/tmp/missing_diseases_meta.txt || true
          if [ -s /tmp/missing_diseases.txt ]; then
            echo "Enfermedades sin imagen JPG (>8 KB) ni SVG:"
            cat /tmp/missing_diseases.txt
            cat /tmp/missing_diseases_meta.txt
            echo "Ejecuta: ruby scripts/images/download_disease_google_images.rb --only-missing"
            exit 1
          fi
          cat /tmp/missing_diseases_meta.txt
          echo "Todas las enfermedades únicas tienen imagen JPG o SVG de respaldo."

      - name: Validar sincronización JSON → JS (incluye enlaces clínicos)
        run: |
          SOLO_JS=1 bash actualizar_datos.sh
          git diff --exit-code -- data/enciclopedia.js data/diccionario_medicos.js data/enlaces_clinicos.js

      - name: Validar integridad de datos y enlaces
        run: ruby scripts/setup/validar_integridad.rb
