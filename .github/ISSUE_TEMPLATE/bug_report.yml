name: Reporte de bug
description: Reporta un error en el sitio, datos o CI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar. Incluye pasos para reproducir y entorno (navegador, URL).
  - type: textarea
    id: description
    attributes:
      label: Descripción del problema
      placeholder: ¿Qué ocurrió y qué esperabas?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a ...
        2. Clic en ...
        3. Ver error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - Interfaz / navegación
        - Datos (razas, enfermedades, glosario)
        - Imágenes
        - CI / despliegue
        - Documentación
        - Otro
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Navegador y versión
      placeholder: "Ej. Chrome 125, Safari iOS 17"
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Busqué en issues cerrados sin encontrar duplicado
          required: true
        - label: Probé en la URL de producción o en main actualizado
          required: false
