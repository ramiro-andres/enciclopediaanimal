<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pruebas E2E — Enciclopedia Animal</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; background: #f4f7f2; }
    h1 { color: #1b4332; }
    .pass { color: #1b4332; }
    .fail { color: #c1121f; }
    #summary { font-size: 1.2rem; margin: 1rem 0; font-weight: 600; }
    li { margin: 0.3rem 0; }
    iframe { display: none; }
  </style>
</head>
<body>
  <h1>🧪 Pruebas E2E en navegador</h1>
  <p>Probando la página principal en un iframe real...</p>
  <div id="summary">Ejecutando...</div>
  <ul id="results"></ul>
  <iframe id="appFrame" src="../index.html"></iframe>

  <script>
    const tests = [];
    function assert(name, condition) {
      tests.push({ name, pass: !!condition });
    }

    async function waitForApp(frame, timeout = 8000) {
      const start = Date.now();
      while (Date.now() - start < timeout) {
        const state = frame.contentWindow?.__E2E_STATE__;
        if (state?.ready) return state;
        if (frame.contentDocument?.querySelector('.empty-state .empty-icon')?.textContent === '⚠️') {
          throw new Error('La página mostró error de carga');
        }
        await new Promise(r => setTimeout(r, 100));
      }
      throw new Error('Timeout: la app no cargó en ' + timeout + 'ms');
    }

    async function runInteractionTests(frame) {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;

      // Entrar a exploración desde inicio
      assert('Vista inicio activa al cargar', doc.getElementById('welcomeView').classList.contains('active'));

      const perrosCard = doc.querySelector('#welcomeCategoryCards [data-animal="perros"]');
      perrosCard.click();
      await new Promise(r => setTimeout(r, 50));
      assert('Filtro Perros muestra 43 razas', doc.getElementById('resultsCount').textContent === '43');
      assert('Nav de tipos oculto al elegir categoría', doc.getElementById('animalNavSection').hidden === true);

      // Filtro Aves
      doc.getElementById('changeCategoryBtn').click();
      await new Promise(r => setTimeout(r, 50));
      const avesCard = doc.querySelector('#welcomeCategoryCards [data-animal="aves"]');
      avesCard.click();
      await new Promise(r => setTimeout(r, 50));
      assert('Filtro Aves muestra 62 razas', doc.getElementById('resultsCount').textContent === '62');

      // Ver todas las razas
      doc.getElementById('changeCategoryBtn').click();
      await new Promise(r => setTimeout(r, 50));
      doc.getElementById('btnExploreAll').click();
      await new Promise(r => setTimeout(r, 50));
      assert('Ver todas muestra 355 razas', doc.getElementById('resultsCount').textContent === '355');

      // Búsqueda
      const search = doc.getElementById('searchInput');
      search.value = 'chihuahua';
      search.dispatchEvent(new Event('input', { bubbles: true }));
      await new Promise(r => setTimeout(r, 50));
      assert('Búsqueda Chihuahua encuentra 1 raza', doc.getElementById('resultsCount').textContent === '1');

      // Abrir detalle de raza
      search.value = '';
      search.dispatchEvent(new Event('input', { bubbles: true }));
      await new Promise(r => setTimeout(r, 50));
      doc.getElementById('btnExploreAll').click();
      await new Promise(r => setTimeout(r, 50));
      const card = doc.querySelector('.breed-card[data-key="perros:chihuahua"]');
      assert('Tarjeta Chihuahua existe', !!card);
      card.click();
      await new Promise(r => setTimeout(r, 50));
      assert('Vista detalle activa', doc.getElementById('detailView').classList.contains('active'));
      assert('Detalle muestra nombre Chihuahua', doc.getElementById('breedDetail').textContent.includes('Chihuahua'));
      assert('Detalle tiene enfermedades', doc.querySelectorAll('#breedDetail .disease-card').length >= 3);

      // Abrir enfermedad
      doc.querySelector('#breedDetail .disease-card').click();
      await new Promise(r => setTimeout(r, 50));
      assert('Vista enfermedad activa', doc.getElementById('diseaseView').classList.contains('active'));
      assert('Enfermedad muestra síntomas', doc.getElementById('diseaseDetail').textContent.includes('Síntomas'));
      assert('Enfermedad muestra tratamiento', doc.getElementById('diseaseDetail').textContent.includes('Tratamiento'));

      // Volver
      doc.getElementById('backDiseaseBtn').click();
      await new Promise(r => setTimeout(r, 50));
      assert('Volver a raza funciona', doc.getElementById('detailView').classList.contains('active'));
    }

    async function run() {
      const frame = document.getElementById('appFrame');
      try {
        await new Promise((resolve, reject) => {
          frame.onload = resolve;
          frame.onerror = reject;
          setTimeout(() => reject(new Error('iframe no cargó')), 10000);
        });

        const state = await waitForApp(frame);

        assert('App carga sin error', state.ready === true);
        assert('Vista inicio por defecto', state.welcomeActive === true);
        assert('13 tipos de animales', state.animales === 13);
        assert('355 razas totales', state.razas === 355);
        assert('2099 enfermedades', state.enfermedades === 2099);
        assert('14 botones de navegación', state.navItems === 14);
        assert('13 tarjetas de categoría en inicio', state.categoryCards === 13);
        assert('0 tarjetas de razas en inicio', state.breedCards === 0);
        assert('Panel resumen muestra 13 animales', state.statsAnimales === '13');

        await runInteractionTests(frame);
      } catch (err) {
        assert('Página carga correctamente: ' + err.message, false);
      }

      const passed = tests.filter(t => t.pass).length;
      const failed = tests.filter(t => !t.pass).length;
      const allPass = failed === 0;

      document.getElementById('summary').innerHTML = allPass
        ? `<span class="pass">✅ ${passed}/${tests.length} pruebas pasaron</span>`
        : `<span class="fail">❌ ${failed} fallaron, ${passed} pasaron de ${tests.length}</span>`;

      document.getElementById('results').innerHTML = tests.map(t =>
        `<li class="${t.pass ? 'pass' : 'fail'}">${t.pass ? '✓' : '✗'} ${t.name}</li>`
      ).join('');

      window.__E2E_RESULTS__ = { passed, failed, total: tests.length, allPass, tests };
      document.title = allPass ? 'E2E PASS' : 'E2E FAIL';
    }

    run();
  </script>
</body>
</html>
